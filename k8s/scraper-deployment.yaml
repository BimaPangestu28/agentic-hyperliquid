apiVersion: apps/v1
kind: Deployment
metadata:
  name: scraper
  namespace: agentic-hyperliquid
  labels:
    app: neurobro-scraper
spec:
  replicas: 1
  strategy:
    type: Recreate     # singleton: one scraper at a time; avoids PVC RWO contention
  selector:
    matchLabels:
      app: neurobro-scraper
  template:
    metadata:
      labels:
        app: neurobro-scraper
    spec:
      imagePullSecrets:
        - name: ghcr-pull   # remove if the GHCR package is made public
      containers:
        - name: scraper
          image: ghcr.io/bimapangestu28/agentic-hyperliquid-scraper:latest   # CI re-pins to :sha
          envFrom:
            - secretRef:
                name: agentic-hyperliquid-env   # same secret as the bot; provides BOT_API_TOKEN
          env:
            # BOT_API_URL: in-cluster address of the bot's HTTP API (axum) server.
            # NOTE: the bot has no Service manifest yet and binds 127.0.0.1:8088 by
            # default. Before deploying the scraper: (1) set the bot's HTTP_BIND_ADDR to
            # 0.0.0.0:8088 so it accepts in-cluster traffic, and (2) create a ClusterIP
            # Service named "bot" exposing port 8088. Then this URL resolves.
            - name: BOT_API_URL
              value: "http://bot:8088"
            # Persistent Chrome profile on the shared PVC — holds the Cloudflare
            # cf_clearance cookie + Neurobro auth. THIS is what the loop reuses.
            # Bootstrap once: run `npm run login` locally, then copy the profile up:
            #   kubectl cp ./neurobro-profile <pod>:/data/neurobro-profile -n agentic-hyperliquid
            - name: NEUROBRO_USER_DATA_DIR
              value: /data/neurobro-profile
            # Headful under Xvfb (set in the image) — headless is blocked by Cloudflare.
            - name: HEADLESS
              value: "false"
            # Persisted Neurobro quota counter on the PVC (survives restarts, resets daily).
            - name: NEUROBRO_QUOTA_STATE
              value: /data/neurobro-quota.json
            # Daily cap of analyses (1 "light" chat each; plan ≈100/day). Set BELOW 100 to
            # leave room for any manual Neurobro use — the counter only tracks the scraper.
            - name: MAX_ANALYSES_PER_DAY
              value: "90"
            - name: MAX_ANALYSES_PER_CYCLE
              value: "1"
            # Pace usage across the day: ~90/day ≈ one every ~16 min. 900s spreads evenly
            # instead of burning the budget in the first hour.
            - name: POLL_INTERVAL_SECS
              value: "900"
            # Optional session-death alerts. TELEGRAM_BOT_TOKEN comes from the shared
            # secret (envFrom); set the recipient chat id here (or add it to the secret).
            - name: TELEGRAM_CHAT_ID
              value: ""   # ← put your Telegram user/chat id to enable "session expired" alerts
          volumeMounts:
            - name: data
              mountPath: /data
          resources:
            requests:
              cpu: "250m"
              memory: "1Gi"    # real Chrome headful + Xvfb needs more than headless
            limits:
              cpu: "1500m"
              memory: "2Gi"
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: data   # same PVC as the bot (ReadWriteOnce — both pods must land on the same node)
