apiVersion: apps/v1
kind: Deployment
metadata:
  name: scraper
  namespace: agentic-hyperliquid
  labels:
    app: neurobro-scraper
spec:
  # 0 while the scraper is run locally (`make up`) during testing — two scrapers against
  # one bot would double-execute the same coins. Set back to 1 to run it in-cluster.
  replicas: 0
  strategy:
    type: Recreate     # singleton: one scraper at a time; avoids PVC RWO contention
  selector:
    matchLabels:
      app: neurobro-scraper
  template:
    metadata:
      labels:
        app: neurobro-scraper
    spec:
      imagePullSecrets:
        - name: ghcr-pull   # remove if the GHCR package is made public
      containers:
        - name: scraper
          image: ghcr.io/bimapangestu28/agentic-hyperliquid-scraper:latest   # CI re-pins to :sha
          envFrom:
            - secretRef:
                name: agentic-hyperliquid-env   # shared secret (TELEGRAM_BOT_TOKEN, etc.)
          env:
            # The scraper expects BOT_API_TOKEN; the shared secret stores the same value
            # under the bot's name PORTFOLIO_API_TOKEN. Map it. (The secret MUST contain
            # PORTFOLIO_API_TOKEN — that key also enables the bot's HTTP API.)
            - name: BOT_API_TOKEN
              valueFrom:
                secretKeyRef:
                  name: agentic-hyperliquid-env
                  key: PORTFOLIO_API_TOKEN
            # BOT_API_URL: in-cluster address of the bot's HTTP API (axum) server.
            # NOTE: the bot has no Service manifest yet and binds 127.0.0.1:8088 by
            # default. Before deploying the scraper: (1) set the bot's HTTP_BIND_ADDR to
            # 0.0.0.0:8088 so it accepts in-cluster traffic, and (2) create a ClusterIP
            # Service named "bot" exposing port 8088. Then this URL resolves.
            - name: BOT_API_URL
              value: "http://bot:8088"
            # Persistent Chrome profile on the shared PVC — holds the Cloudflare
            # cf_clearance cookie + Neurobro auth. THIS is what the loop reuses.
            # Bootstrap once: run `npm run login` locally, then copy the profile up:
            #   kubectl cp ./neurobro-profile <pod>:/data/neurobro-profile -n agentic-hyperliquid
            - name: NEUROBRO_USER_DATA_DIR
              value: /data/neurobro-profile
            # TradingView date-range tab clicked before screenshotting for Neurobro.
            # "1D" = one day of 1-minute candles (scalping). Matches the button's value /
            # data-name="date-range-tab-<VALUE>" (e.g. 1D, 5D, 1M).
            - name: HL_TIMEFRAME
              value: "1D"
            # Headful under Xvfb (set in the image) — headless is blocked by Cloudflare.
            - name: HEADLESS
              value: "false"
            # Persisted Neurobro quota counter on the PVC (survives restarts, resets daily).
            - name: NEUROBRO_QUOTA_STATE
              value: /data/neurobro-quota.json
            # Daily cap of analyses (1 "light" chat each; plan ≈100/day). Set BELOW 100 to
            # leave room for any manual Neurobro use — the counter only tracks the scraper.
            - name: MAX_ANALYSES_PER_DAY
              value: "90"
            # 0 = scan ALL eligible coins each cycle (burst all 10 at startup; re-scan a
            # coin the moment its TP/SL frees it). The daily cap is the budget guard.
            - name: MAX_ANALYSES_PER_CYCLE
              value: "0"
            # Short poll → fast startup burst + fast capital recycle when a position closes.
            - name: POLL_INTERVAL_SECS
              value: "120"
            # Cooldown after a skip (e.g. conf<7). With ~10 coins on a 90/day budget each
            # coin can be re-checked ~9×/day → ≥ 24h/9 ≈ 2.7h between re-checks. 3h keeps
            # the worst case (all coins skipping) at ~80/day, under the cap.
            - name: COOLDOWN_SECS
              value: "10800"
            # Telegram activity + alert notifications. TELEGRAM_BOT_TOKEN and
            # TELEGRAM_ALLOWED_USER_IDS both come from the shared secret (envFrom); the
            # scraper auto-uses the first allowed user id as the chat to notify, so no
            # extra config is needed. Set TELEGRAM_CHAT_ID here only to override the
            # recipient (e.g. notify a different chat than the bot's allow-list).
          volumeMounts:
            - name: data
              mountPath: /data
          resources:
            requests:
              cpu: "250m"
              memory: "1Gi"    # real Chrome headful + Xvfb needs more than headless
            limits:
              cpu: "1500m"
              memory: "2Gi"
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: data   # same PVC as the bot (ReadWriteOnce — both pods must land on the same node)
